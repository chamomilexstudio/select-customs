<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <!-- Gold gradient for shield border -->
    <linearGradient id="goldBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f7e08a"/>
      <stop offset="40%"  stop-color="#d4870a"/>
      <stop offset="100%" stop-color="#8b5a0a"/>
    </linearGradient>

    <!-- Flame gradient -->
    <radialGradient id="flameGrad" cx="50%" cy="80%" r="70%">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="40%"  stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#c0271a"/>
    </radialGradient>

    <!-- Steel gradient for axe heads -->
    <linearGradient id="steelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f0f0"/>
      <stop offset="50%"  stop-color="#b8b8b8"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>

    <!-- Wood gradient for axe handles -->
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e0b870"/>
      <stop offset="100%" stop-color="#9a6820"/>
    </linearGradient>

    <!-- Navy inner gradient -->
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e2d50"/>
      <stop offset="100%" stop-color="#0d1624"/>
    </linearGradient>

    <!-- Glow filter for flame -->
    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for axes -->
    <filter id="axisShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ═══ SHIELD OUTER (gold) ═══ -->
  <path d="M 200,472
           Q 38,390 38,295
           L 38,72
           Q 38,44 66,44
           L 334,44
           Q 362,44 362,72
           L 362,295
           Q 362,390 200,472 Z"
        fill="url(#goldBorder)"/>

  <!-- ═══ SHIELD INNER (dark navy) ═══ -->
  <path d="M 200,455
           Q 57,378 57,290
           L 57,77
           Q 57,62 70,62
           L 330,62
           Q 343,62 343,77
           L 343,290
           Q 343,378 200,455 Z"
        fill="url(#navyGrad)"/>

  <!-- Inner decorative border -->
  <path d="M 200,440
           Q 73,368 73,284
           L 73,82
           Q 73,76 79,76
           L 321,76
           Q 327,76 327,82
           L 327,284
           Q 327,368 200,440 Z"
        fill="none" stroke="rgba(212,135,10,0.40)" stroke-width="1.5"/>

  <!-- ═══ CROSSED AXES ═══ -->
  <g filter="url(#axisShadow)" transform="translate(200,210)">

    <!-- Axe 1: tilted -45° (handle runs NW→SE) -->
    <g transform="rotate(-45)">
      <!-- Handle / haft -->
      <rect x="-7" y="-95" width="14" height="190" rx="5" fill="url(#woodGrad)"/>
      <!-- Handle grip wrap marks -->
      <rect x="-7" y="50"  width="14" height="6"  rx="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="-7" y="64"  width="14" height="6"  rx="2" fill="rgba(0,0,0,0.25)"/>
      <!-- Axe head body -->
      <path d="M -36,-130 L 28,-130 L 28,-92 L -36,-92 Q -48,-111 -36,-130 Z"
            fill="url(#steelGrad)" rx="3"/>
      <!-- Blade edge highlight -->
      <line x1="-36" y1="-130" x2="-36" y2="-92" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <!-- Pick spike -->
      <polygon points="28,-130  58,-147  28,-120" fill="url(#steelGrad)"/>
      <!-- Poll (butt) -->
      <rect x="22" y="-102" width="10" height="14" rx="2" fill="#999"/>
    </g>

    <!-- Axe 2: tilted +45° (handle runs NE→SW) -->
    <g transform="rotate(45)">
      <rect x="-7" y="-95" width="14" height="190" rx="5" fill="url(#woodGrad)"/>
      <rect x="-7" y="50"  width="14" height="6"  rx="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="-7" y="64"  width="14" height="6"  rx="2" fill="rgba(0,0,0,0.25)"/>
      <path d="M -36,-130 L 28,-130 L 28,-92 L -36,-92 Q -48,-111 -36,-130 Z"
            fill="url(#steelGrad)"/>
      <line x1="-36" y1="-130" x2="-36" y2="-92" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <polygon points="28,-130  58,-147  28,-120" fill="url(#steelGrad)"/>
      <rect x="22" y="-102" width="10" height="14" rx="2" fill="#999"/>
    </g>

    <!-- Center rivet / boss -->
    <circle cx="0" cy="0" r="10" fill="#d4870a"/>
    <circle cx="0" cy="0" r="6"  fill="#f7e08a"/>
    <circle cx="0" cy="0" r="3"  fill="#d4870a"/>
  </g>

  <!-- ═══ FLAME (top center, above axes) ═══ -->
  <g transform="translate(200,112)" filter="url(#flameGlow)">
    <!-- Outer flame -->
    <path d="M 0,-54
             C -6,-42 -20,-26 -16,-10
             C -12,4  -5,10   0,18
             C  5,10  12,4   16,-10
             C 20,-26  6,-42  0,-54 Z"
          fill="url(#flameGrad)"/>
    <!-- Inner bright core -->
    <path d="M 0,-40
             C -3,-30 -10,-18  -8,-6
             C -5,2   0,7     0,12
             C  0,7   5,2     8,-6
             C 10,-18  3,-30  0,-40 Z"
          fill="#fff5aa" opacity="0.75"/>
  </g>

  <!-- ═══ THIN DIVIDER LINE ═══ -->
  <line x1="100" y1="310" x2="300" y2="310" stroke="#d4870a" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══ TEXT: SELECT ═══ -->
  <text x="200" y="350"
        font-family="Impact, 'Arial Narrow', 'Franklin Gothic Heavy', sans-serif"
        font-size="54"
        font-weight="900"
        fill="#f5f5f0"
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#textShadow)">SELECT</text>

  <!-- ═══ TEXT: CUSTOMS ═══ -->
  <text x="200" y="395"
        font-family="Impact, 'Arial Narrow', 'Franklin Gothic Heavy', sans-serif"
        font-size="50"
        font-weight="900"
        fill="#d4870a"
        text-anchor="middle"
        letter-spacing="5"
        filter="url(#textShadow)">CUSTOMS</text>

  <!-- ═══ BOTTOM BANNER ═══ -->
  <path d="M 88,415 L 312,415 L 318,432 L 82,432 Z" fill="#c0271a"/>
  <!-- Banner notch cuts -->
  <polygon points="82,415  70,423  82,432" fill="#8a1a10"/>
  <polygon points="318,415 330,423 318,432" fill="#8a1a10"/>

  <text x="200" y="428"
        font-family="Impact, 'Arial Narrow', sans-serif"
        font-size="13"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="3">HILLIARD · OHIO</text>

  <!-- ═══ CORNER STARS (decorative) ═══ -->
  <!-- Top-left star -->
  <g transform="translate(98,105)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,3 -5,7 -3,1 -7,-3 -2,-3"
             fill="#d4870a" opacity="0.7"/>
  </g>
  <!-- Top-right star -->
  <g transform="translate(302,105)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,3 -5,7 -3,1 -7,-3 -2,-3"
             fill="#d4870a" opacity="0.7"/>
  </g>
</svg>
